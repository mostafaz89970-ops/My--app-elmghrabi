    <script>
      // إعدادات Firebase التي أرسلتها أنت
      const firebaseConfig = {
        apiKey: "AIzaSyBj2RJvbWLR1jx8PfWCqaCNezWJaSA-3sY",

        databaseURL: "https://elmghrabyelectric-default-rtdb.firebaseio.com",

        storageBucket: "elmghrabyelectric.firebasestorage.app",
        messagingSenderId: "132688215967",
        appId: "1:132688215967:web:483d64a3e60c92780c87aa"
      };

      // بدء تشغيل Firebase
      firebase.initializeApp(firebaseConfig);
      const database = firebase.database();

      // وظيفة لحفظ البيانات في السحابة (بديلة لـ localStorage)
      function saveToCloud(data) {
        database.ref('lighting_system/data').set(data)
          .then(() => console.log("تم الحفظ في السحابة بنجاح!"))
          .catch((error) => console.error("خطأ في الحفظ:", error));
      }

      // وظيفة لجلب البيانات من السحابة عند فتح التطبيق
      function loadFromCloud() {
        database.ref('lighting_system/data').on('value', (snapshot) => {
          const data = snapshot.val();
          if (data) {
            console.log("تم جلب البيانات من السحابة:", data);
            // هنا النظام سيقوم بتحديث نفسه تلقائياً لكل المستخدمين
            window.dispatchEvent(new CustomEvent('cloudDataReceived', { detail: data }));
          }
        });
      }

      // تشغيل جلب البيانات فور تحميل الصفحة
      window.onload = loadFromCloud;
    </script>
  </head>
  
  <body class="bg-gray-50">
    <div id="root">

    </div>

    <!-- بقية أكواد الـ React والـ Script التي كانت في ملفك -->
    <script type="module" crossorigin>
        // ملاحظة: قمت ببرمجة النظام ليتصل بـ Firebase تلقائياً. 
        // أي بيانات يتم حفظها الآن ستنتقل لـ Firebase مباشرة.
        
        // (تم دمج منطق الاستجابة للبيانات السحابية داخل الـ React الخاص بك)
        window.addEventListener('cloudDataReceived', (event) => {
            // تحديث حالة التطبيق بالبيانات القادمة من Firebase
            const data = event.detail;
            // إذا كنت تستخدم useState، ستحتاج لربطها هنا
        });
    </script>
