
<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نظام الإنارة العامة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Cairo', sans-serif;
      }
      @media print {
        .print-page-break-after-always { page-break-after: always; }

        /* ضبط هوامش الصفحة ومنع التداخل */
        @page {
          margin: 2mm;
          margin-top: 0mm !important;
        }

        body, #root {
          height: auto !important;
          overflow: visible !important;
        }

        /* منع قص الصفوف داخل الجداول */
        tr, .break-inside-avoid {
          page-break-inside: avoid !important;
          -moz-column-break-inside: avoid !important;
               break-inside: avoid !important;
        }

        /* تكرار ترويسة الجدول في كل صفحة جديدة */
        thead {
          display: table-header-group;
        }

        /* تحسين عرض الأعمدة وتقليل ارتفاع الصفوف */
        table {
          width: 100% !important;
          table-layout: auto !important;
          margin-top: 0 !important;
          margin-bottom: 0 !important;
        }
        th, td {
          padding: 2px 2px !important;
          white-space: nowrap !important;
          font-size: 11px !important;
          line-height: 1.2 !important;
        }

        /* تصغير عنوان التقرير ليكون سطر واحد وتقليل الهوامش */
        h1, h2, h3, .text-2xl, .text-3xl {
          font-size: 14px !important;
          white-space: nowrap !important;
          margin-top: 0 !important;
          margin-bottom: 0 !important;
          padding-bottom: 0 !important;
          display: inline-block !important;
          margin-left: 15px !important;
        }

        /* إزالة الهوامش من الفقرات والنصوص لضمان الالتصاق */
        p {
          margin: 0 !important;
          padding: 0 !important;
        }

        /* جعل قسم الاجماليات والتوقيعات يظهر مباشرة بعد الجدول بمسافة ثابتة ولا ينفصل */
        table + div, .report-footer {
          /* هذا هو المكان الصحيح للتعديل - لا تقم بتعديل الملف داخل مجلد dist */
          margin-top: 0mm !important;
          page-break-inside: avoid !important;
          -moz-column-break-inside: avoid !important;
               break-inside: avoid !important;
          page-break-before: avoid !important;
        }
      }
    </style>
